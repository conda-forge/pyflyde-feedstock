schema_version: 1

context:
  name: pyflyde
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyflyde-${{ version }}.tar.gz
  sha256: 085688fe548c173690f1ee4426442eaf2259b70434e43bc1256271c8acb02957

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pyflyde = flyde.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - pyyaml

tests:
  - python:
      imports:
        - flyde
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pyflyde --help

about:
  summary: Python SDK and runtime for Flyde - a visual flow-based programming language and IDE.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://pyflyde.readthedocs.io

extra:
  recipe-maintainers:
    - jan-janssen
